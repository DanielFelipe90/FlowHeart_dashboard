pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
    
    def flutterSdkPath = {
        def properties = new Properties()
        def file = new File(settingsDir, 'local.properties')
        if (file.exists()) {
            file.withReader('UTF-8') { reader -> properties.load(reader) }
        }
        return properties.getProperty('flutter.sdk')
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    // Atualizado para 8.11.1 conforme o erro pediu
    id "com.android.application" version "8.11.1" apply false
    // Atualizado para 2.0.0 conforme o erro pediu
    id "org.jetbrains.kotlin.android" version "2.0.0" apply false
}

include ':app'